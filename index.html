<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Sage Villa Meal Selection</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --pri:    #C4473A;
    --pri-d:  #A03228;
    --pri-l:  #FFE8E6;
    --bg:     #F7F3EF;
    --card:   #FFFFFF;
    --text:   #1C1C1E;
    --muted:  #6B6B6B;
    --border: #E5E0DA;
    --ok:     #16A34A;
    --ok-l:   #DCFCE7;
    --r:      16px;
    --rs:     10px;
    --sh:     0 2px 12px rgba(0,0,0,0.07);
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  #root { max-width: 480px; margin: 0 auto; min-height: 100vh; background: var(--bg); }

  .loader { display:flex; align-items:center; justify-content:center; height:80vh; }
  .spin {
    width:36px; height:36px;
    border:3px solid var(--border); border-top-color:var(--pri);
    border-radius:50%; animation:sp .7s linear infinite;
  }
  @keyframes sp { to { transform:rotate(360deg); } }

  .hdr {
    background:#fff; padding:14px 20px 12px;
    border-bottom:1px solid var(--border);
    position:sticky; top:0; z-index:20;
  }
  .hdr-brand { font-size:11px; font-weight:600; letter-spacing:1.4px; text-transform:uppercase; color:var(--muted); }
  .hdr-title { font-size:20px; font-weight:800; }
  .hdr-back {
    background:none; border:none; cursor:pointer; padding:0;
    font-size:14px; font-weight:500; color:var(--pri);
    display:flex; align-items:center; gap:4px; margin-bottom:6px;
  }

  .main { padding:20px; }

  .btn {
    display:block; width:100%; padding:14px 20px;
    border-radius:var(--rs); border:none;
    font-size:15px; font-weight:700; cursor:pointer;
    transition:all .15s; text-align:center;
  }
  .btn-pri { background:var(--pri); color:#fff; }
  .btn-pri:hover:not(:disabled) { background:var(--pri-d); }
  .btn-pri:disabled { background:#D1D5DB; cursor:not-allowed; }
  .btn-out { background:#fff; border:1.5px solid var(--border); color:var(--text); }
  .btn-out:hover { border-color:var(--pri); color:var(--pri); }
  .row { display:flex; gap:10px; }
  .row .back-sm {
    flex:0 0 auto; padding:14px 18px; background:#fff;
    border:1.5px solid var(--border); border-radius:var(--rs); cursor:pointer; font-size:15px;
  }
  .row .btn { flex:1; }

  .hero { text-align:center; padding:40px 20px 24px; }
  .hero .em { font-size:52px; display:block; margin-bottom:12px; }
  .hero h1 { font-size:26px; font-weight:800; margin-bottom:8px; }
  .hero p { font-size:15px; color:var(--muted); line-height:1.5; }

  .divider {
    display:flex; align-items:center; gap:12px;
    margin:20px 0; color:var(--muted); font-size:13px;
  }
  .divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--border); }

  .join-row { display:flex; gap:8px; margin-top:16px; }
  .join-in {
    flex:1; padding:12px 14px; font-size:16px;
    border:1.5px solid var(--border); border-radius:var(--rs);
    text-transform:uppercase; letter-spacing:2px; font-weight:700; outline:none;
  }
  .join-in:focus { border-color:var(--pri); }
  .join-go {
    padding:12px 18px; background:var(--pri); color:#fff;
    border:none; border-radius:var(--rs); font-size:14px; font-weight:700; cursor:pointer;
  }
  .join-go:disabled { background:#D1D5DB; cursor:not-allowed; }

  .code-bar {
    background:#fff; border:1.5px solid var(--border);
    border-radius:var(--rs); padding:12px 16px;
    display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;
  }
  .code-lbl { font-size:11px; color:var(--muted); margin-bottom:2px; }
  .code-val { font-size:22px; font-weight:900; letter-spacing:4px; color:var(--pri); }
  .copy-btn {
    padding:7px 14px; background:var(--pri-l); color:var(--pri);
    border:none; border-radius:8px; font-size:13px; font-weight:700; cursor:pointer; white-space:nowrap;
  }

  .pgrid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
  .pcard {
    background:#fff; border:2px solid var(--border); border-radius:var(--r);
    padding:16px 12px; text-align:center; cursor:pointer;
    transition:all .15s; box-shadow:var(--sh); position:relative;
  }
  .pcard:hover:not(.locked) { border-color:var(--pri); transform:translateY(-1px); }
  .pcard.done  { border-color:var(--ok); }
  .pcard.mine  { border-color:var(--pri); }
  .pcard.locked { cursor:default; opacity:.65; }

  .pav {
    width:48px; height:48px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:18px; font-weight:900; color:#fff; margin:0 auto 10px;
  }
  .pname { font-size:14px; font-weight:700; margin-bottom:4px; }
  .psub  { font-size:12px; color:var(--muted); margin-bottom:6px; }
  .pbadge {
    display:inline-block; padding:3px 10px;
    border-radius:20px; font-size:11px; font-weight:700;
  }
  .bp { background:#F3F4F6; color:var(--muted); }
  .bd { background:var(--ok-l); color:var(--ok); }
  .bm { background:var(--pri-l); color:var(--pri); }
  .you-tag {
    position:absolute; top:8px; right:10px;
    font-size:11px; background:var(--pri); color:#fff;
    padding:2px 7px; border-radius:10px; font-weight:700;
  }

  .prog-wrap { margin-bottom:16px; }
  .prog-lbl { font-size:13px; color:var(--muted); margin-bottom:6px; }
  .prog-bar { height:4px; background:var(--border); border-radius:4px; overflow:hidden; }
  .prog-fill { height:100%; background:var(--pri); border-radius:4px; transition:width .4s; }

  .wa-btn {
    display:flex; align-items:center; justify-content:center; gap:10px;
    width:100%; padding:14px; background:#25D366; color:#fff;
    border:none; border-radius:var(--rs); font-size:15px; font-weight:700;
    cursor:pointer; transition:background .15s; margin-bottom:12px;
  }
  .wa-btn:hover { background:#1DA856; }

  /* Cuisine block вЂљГ„Г® consolidated single-page order */
  .cuisine-block { margin-bottom:6px; }
  .cuisine-banner {
    display:flex; align-items:center; gap:10px;
    padding:11px 18px; border-radius:var(--r) var(--r) 0 0;
    color:#fff; margin-top:22px; margin-bottom:0;
  }
  .cuisine-banner:first-of-type { margin-top:0; }
  .cuisine-em { font-size:22px; }
  .cuisine-nm { font-size:15px; font-weight:800; }
  .cuisine-block > .scard:first-of-type { border-radius:0; }

  .scard {
    background:#fff; border-radius:var(--r); padding:18px;
    box-shadow:var(--sh); margin-bottom:8px;
    border:1.5px solid transparent; transition:border-color .2s;
  }
  .scard.ok { border-color:var(--ok); }
  .slbl { font-size:15px; font-weight:700; margin-bottom:3px; display:flex; align-items:center; justify-content:space-between; }
  .slbl .chk { color:var(--ok); font-size:16px; }
  .shint { font-size:12px; color:var(--muted); margin-bottom:12px; }
  .shint .cnt { font-weight:800; }

  .glbl {
    font-size:11px; font-weight:700; text-transform:uppercase;
    letter-spacing:.8px; color:var(--muted); margin:12px 0 8px;
  }
  .ilist { display:flex; flex-direction:column; gap:6px; }

  .ibtn {
    padding:10px 14px; border:1.5px solid var(--border); border-radius:var(--rs);
    background:#fff; font-size:14px; text-align:left; cursor:pointer;
    display:flex; align-items:center; justify-content:space-between;
    transition:all .12s; color:var(--text);
  }
  .ibtn:hover:not(:disabled) { border-color:var(--pri); background:var(--pri-l); }
  .ibtn.ss { border-color:var(--pri); background:var(--pri-l); font-weight:700; }
  .ibtn.ss::after { content:'вЂљГєГ¬'; color:var(--pri); font-weight:900; }
  .ibtn.sm { border-color:var(--ok); background:var(--ok-l); font-weight:700; }
  .ibtn.sm::after { content:'вЂљГєГ¬'; color:var(--ok); font-weight:900; }
  .ibtn:disabled:not(.sm) { opacity:.3; cursor:not-allowed; }

  .fchips { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
  .fchip { padding:4px 10px; background:#F3F4F6; border-radius:20px; font-size:12px; color:var(--muted); }

  .nin {
    width:100%; padding:14px 16px; font-size:16px;
    border:2px solid var(--border); border-radius:var(--rs);
    outline:none; transition:border-color .2s; margin-bottom:20px;
  }
  .nin:focus { border-color:var(--pri); }
  .helper { font-size:14px; color:var(--muted); margin-bottom:20px; line-height:1.5; }

  /* Summary */
  .sum-card { background:#fff; border-radius:var(--r); overflow:hidden; box-shadow:var(--sh); margin-bottom:16px; }
  .sum-hdr { padding:14px 18px; color:#fff; display:flex; align-items:center; gap:12px; }
  .sum-av {
    width:40px; height:40px; border-radius:50%;
    background:rgba(255,255,255,.25);
    display:flex; align-items:center; justify-content:center;
    font-size:15px; font-weight:900; flex-shrink:0;
  }
  .sum-pname { font-size:16px; font-weight:800; }
  .sum-body { padding:14px 18px; }
  .sum-cuisine-lbl {
    font-size:11px; font-weight:700; text-transform:uppercase;
    letter-spacing:.8px; color:var(--muted); margin:14px 0 8px;
    padding-bottom:4px; border-bottom:1px solid var(--border);
  }
  .sum-cuisine-lbl:first-child { margin-top:0; }
  .srow {
    display:flex; justify-content:space-between;
    padding:6px 0; border-bottom:1px solid #F5F0EB; font-size:14px;
  }
  .srow:last-child { border-bottom:none; }
  .sl { color:var(--muted); font-size:12px; flex-shrink:0; max-width:38%; line-height:1.3; }
  .sv { font-weight:600; text-align:right; max-width:60%; }

  .toast {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:#1C1C1E; color:#fff; padding:10px 22px;
    border-radius:20px; font-size:14px; font-weight:600; z-index:999;
    animation:tin .2s ease;
  }
  @keyframes tin { from { opacity:0; transform:translateX(-50%) translateY(8px); } }

  .sstep { background:#fff; border-radius:var(--r); padding:18px; margin-bottom:12px; box-shadow:var(--sh); }
  .sstep-num {
    width:28px; height:28px; border-radius:50%; background:var(--pri); color:#fff;
    font-size:14px; font-weight:800; display:flex; align-items:center; justify-content:center; margin-bottom:10px;
  }
  .sstep h3 { font-size:15px; font-weight:800; margin-bottom:6px; }
  .sstep p, .sstep li { font-size:13px; color:var(--muted); line-height:1.65; }
  .sstep code { background:#F3F4F6; padding:2px 6px; border-radius:4px; font-size:12px; font-family:monospace; }
  .sstep ul { padding-left:16px; margin-top:4px; }
  .sstep pre {
    background:#1C1C1E; color:#A8FF78; padding:12px; border-radius:8px;
    font-size:11.5px; margin-top:8px; overflow-x:auto;
    font-family:monospace; line-height:1.6; white-space:pre-wrap;
  }

  .tabs { display:flex; gap:6px; margin-bottom:18px; }
  .tab {
    flex:1; padding:10px; border-radius:var(--rs);
    border:1.5px solid var(--border); background:#fff;
    font-size:13px; font-weight:700; cursor:pointer; transition:all .15s;
    color:var(--muted);
  }
  .tab.active { background:var(--pri); color:#fff; border-color:var(--pri); }

  .cgroup { background:#fff; border-radius:var(--r); box-shadow:var(--sh); margin-bottom:14px; overflow:hidden; }
  .cgroup-hdr {
    padding:12px 16px; display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid var(--border);
  }
  .cgroup-label { font-size:15px; font-weight:800; }
  .cgroup-count {
    font-size:11px; font-weight:700; padding:3px 9px;
    background:var(--pri-l); color:var(--pri); border-radius:20px;
  }
  .citem {
    display:flex; align-items:flex-start; justify-content:space-between;
    padding:10px 16px; border-bottom:1px solid #F5F0EB; gap:10px;
  }
  .citem:last-child { border-bottom:none; }
  .citem-dish { font-size:14px; font-weight:600; flex:1; }
  .citem-right { text-align:right; flex-shrink:0; }
  .citem-count {
    display:inline-block; font-size:12px; font-weight:800;
    background:var(--pri); color:#fff;
    padding:2px 8px; border-radius:10px; margin-bottom:3px;
  }
  .citem-who { font-size:11px; color:var(--muted); }

  @media print {
    .np { display:none !important; }
    .cgroup { page-break-inside:avoid; }
    .sum-card { page-break-inside:avoid; }
    body { background:white; }
    #root { max-width:100%; }
  }
  </style>
</head>

function buildConsolidatedOrder(data) {
  const people = data?.people
    ? Object.values(data.people).filter(p => p.confirmed)
    : [];

  const GROUPS = [
    { id:"soups",    label:"пЈїГјвЂўВЈ Soups",         src:[{c:"chinese",s:"soup"},{c:"continental",s:"soup"}] },
    { id:"starters", label:"пЈїГјГ§Вў Starters",       src:[{c:"chinese",s:"starter"},{c:"continental",s:"starter"}] },
    { id:"main",     label:"пЈїГјГ§Гµ Main Course",    src:[{c:"indian",s:"paneer"},{c:"indian",s:"second_main"},{c:"chinese",s:"main"},{c:"continental",s:"veg_main"},{c:"continental",s:"nveg_main"}] },
    { id:"bread",    label:"пЈїГјВґГ¬ Breads",          src:[{c:"indian",s:"bread"}] },
    { id:"dal",      label:"пЈїГјВґГЇ Dal",             src:[{c:"indian",s:"dal"}] },
    { id:"rice",     label:"пЈїГјГ§Г¶ Rice & Noodles", src:[{c:"indian",s:"rice"},{c:"chinese",s:"veg_carb"},{c:"chinese",s:"nveg_carb"}] },
    { id:"dessert",  label:"пЈїГјГ§Г† Desserts",        src:[{c:"indian",s:"dessert"},{c:"continental",s:"dessert"}] },
    { id:"bbq",      label:"пЈїГјГ®вЂў Barbeque",        src:[{c:"barbeque",s:"type"},{c:"barbeque",s:"marination"},{c:"barbeque",s:"sides"}] },
  ];

  return GROUPS.map(group => {
    const itemMap = {};
    people.forEach(person => {
      group.src.forEach(({c, s}) => {
        const val = person.selections?.[c]?.[s];
        if (!val) return;
        const items = Array.isArray(val) ? val : [val];
        items.forEach(item => {
          if (!itemMap[item]) itemMap[item] = [];
          itemMap[item].push(person.name);
        });
      });
    });
    return {
      ...group,
      items: Object.entries(itemMap).map(([dish, names]) => ({ dish, count: names.length, names })),
    };
  }).filter(g => g.items.length > 0);
}

const buildCookText = (data) => {
  const groups = buildConsolidatedOrder(data);
  if (!groups.length) return "";
  const people = data?.people ? Object.values(data.people).filter(p => p.confirmed) : [];
  const date = new Date().toLocaleDateString("en-IN", {day:"numeric", month:"short", year:"numeric"});
  let t = `пЈїГјГ«В®вЂљГ„Г§пЈїГјГ§в‰Ґ COOK'S ORDER SHEET\n${people.length} guests вЂљГ„Г® ${date}\n` + "вЂљГЇГЄ".repeat(30) + "\n\n";
  groups.forEach(g => {
    t += `${g.label}\n`;
    g.items.forEach(item => {
      const qty = item.count > 1 ? ` в€љГі ${item.count}` : "";
      t += `  вЂљГ„Вў ${item.dish}${qty}  (${item.names.join(", ")})\n`;
    });
    t += "\n";
  });
  t += "вЂљГЇГЄ".repeat(30) + "\nвЂљГЁв€ћ Please confirm 72 hrs before meal time.";
  return t;
};

const { useState, useEffect, useCallback } = React;

function useToast() {
  const [msg, setMsg] = useState(null);
  const show = useCallback(m => { setMsg(m); setTimeout(()=>setMsg(null), 2600); }, []);
  return [msg, show];
}

// вЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄ
//  SESSION SCREEN
// вЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄ
function Session({ sessionId, data, mySlot, onClaim, onSummary }) {
  const [toast, showToast] = useToast();
  const people   = data?.people ? Object.values(data.people) : Array(4).fill({});
  const doneCount = people.filter(p => p.confirmed).length;
  const shareUrl  = `${window.location.origin}${window.location.pathname}?s=${sessionId}`;

  const copyLink = () =>
    navigator.clipboard.writeText(shareUrl).then(() => showToast("Link copied! Paste it in WhatsApp пЈїГјГ«Г§"));

  const waShare = () => {
    const msg = `Sage Villa - Meal Selection\n\nOpen this link on your phone:\n${shareUrl}\n\nSession code: *${sessionId}*\n\nEach person taps their slot and chooses their meal. Takes 2 mins!`;
    window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, "_blank");
  };

  return (
    <div>
      <div className="hdr">
        <div className="hdr-brand">Sage Villa вЂљГ„Г® Meal Selection</div>
        <div className="hdr-title">Group Order В¬в€‘ Code: {sessionId}</div>
      </div>
      <div className="main">
        <div className="code-bar">
          <div>
            <div className="code-lbl">Session Code вЂљГ„Г® share this with others</div>
            <div className="code-val">{sessionId}</div>
          </div>
          <button className="copy-btn" onClick={copyLink}>Copy Link</button>
        </div>
        <button className="wa-btn" onClick={waShare}>
          <span>пЈїГјГ¬в‰¤</span> Share via WhatsApp
        </button>
        <div className="prog-wrap">
          <div className="prog-lbl">{doneCount} of 4 orders placed</div>
          <div className="prog-bar"><div className="prog-fill" style={{width:`${doneCount*25}%`}}/></div>
        </div>
        <div className="pgrid">
          {people.map((p, i) => {
            const isMine  = mySlot === i;
            const claimed = !!p.name || !!p.reservedAt;
            const done    = !!p.confirmed;
            const locked  = claimed && !isMine;
            const cuisines = p.selections
              ? Object.keys(p.selections).filter(k => Object.values(p.selections[k]||{}).some(v=>v))
              : [];
            return (
              <div
                key={i}
                className={`pcard ${done?"done":""} ${isMine?"mine":""} ${locked?"locked":""}`}
                onClick={() => !locked && onClaim(i)}
              >
                {isMine && <span className="you-tag">You</span>}
                <div className="pav" style={{background:PAX_COLORS[i]}}>
                  {p.name ? initials(p.name) : (i+1)}
                </div>
                <div className="pname">{p.name || `Person ${i+1}`}</div>
                {cuisines.length > 0 && (
                  <div className="psub">{cuisines.map(k=>MM[k].emoji).join(" ")}</div>
                )}
                <span className={`pbadge ${done?"bd":isMine?"bm":"bp"}`}>
                  {done ? "вЂљГєГ¬ Done" : isMine ? "Tap to order" : "WaitingвЂљГ„В¶"}
                </span>
              </div>
            );
          })}
        </div>
        <button className="btn btn-pri" onClick={onSummary} disabled={doneCount===0}>
          {doneCount===4 ? "пЈїГјГ©Гў View & Share Complete Order" : `View Orders (${doneCount}/4 ready)`}
        </button>
        <p style={{fontSize:12,color:"var(--muted)",textAlign:"center",marginTop:12}}>
          All orders update live вЂљГ„Г® no refresh needed.
        </p>
      </div>
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

// вЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄ
//  ORDER FLOW  вЂљГ„Г® name вЂљГњГ­ all cuisines on one page
// вЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄ
function OrderFlow({ slotIdx, existing, onSave, onBack }) {
  const [step,       setStep]       = useState("name");
  const [name,       setName]       = useState(existing?.name || "");
  // selections: { indian: { paneer: "Palak Paneer", ... }, chinese: { soup: "..." }, ... }
  const [selections, setSelections] = useState(existing?.selections || {});

  const setItem = (cuisine, secId, v) =>
    setSelections(prev => ({ ...prev, [cuisine]: { ...(prev[cuisine]||{}), [secId]: v } }));

  const handleItemClick = (cuisine, sec, item) => {
    if (sec.type === "multi3") {
      const cur = selections[cuisine]?.[sec.id] || [];
      setItem(cuisine, sec.id, cur.includes(item) ? cur.filter(x=>x!==item) : cur.length<3 ? [...cur,item] : cur);
    } else {
      setItem(cuisine, sec.id, item);
    }
  };

  const renderItems = (cuisine, sec, items) => items.map(item => {
    const v      = selections[cuisine]?.[sec.id];
    const isSel  = sec.type==="multi3" ? (v||[]).includes(item) : v===item;
    const isFull = sec.type==="multi3" && (v||[]).length>=3;
    return (
      <button key={item}
        className={`ibtn ${isSel ? (sec.type==="multi3"?"sm":"ss") : ""}`}
        onClick={() => handleItemClick(cuisine, sec, item)}
        disabled={sec.type==="multi3" && isFull && !isSel}
      >{item}</button>
    );
  });

  const canConfirm = name.trim().length > 0 && anySelected(selections);

  // вЂљГ®Г„ Step: Name вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„
  if (step === "name") return (
    <div>
      <div className="hdr">
        <button className="hdr-back" onClick={onBack}>вЂљГњГЄ Back</button>
        <div className="hdr-brand">Slot {slotIdx+1}</div>
        <div className="hdr-title">What's your name?</div>
      </div>
      <div className="main">
        <input className="nin" type="text" placeholder={`Person ${slotIdx+1}`}
          value={name} onChange={e=>setName(e.target.value)} autoFocus />
        <button className="btn btn-pri" onClick={()=>setStep("picks")}>Next вЂљГњГ­</button>
      </div>
    </div>
  );

  // вЂљГ®Г„ Step: All cuisines on one page вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„вЂљГ®Г„
  return (
    <div>
      <div className="hdr">
        <button className="hdr-back" onClick={()=>setStep("name")}>вЂљГњГЄ Back</button>
        <div className="hdr-brand">{name||`Person ${slotIdx+1}`}</div>
        <div className="hdr-title">Make Your Picks</div>
      </div>
      <div className="main">
        <p className="helper" style={{marginBottom:4}}>Select from any cuisine below. Pick as many as you like.</p>

        {Object.entries(MENU).map(([cuisine, menuData]) => {
          const m = MM[cuisine];
          return (
            <div key={cuisine} className="cuisine-block">
              <div className="cuisine-banner" style={{background:m.color}}>
                <span className="cuisine-em">{m.emoji}</span>
                <span className="cuisine-nm">{m.name}</span>
              </div>

              {menuData.sections.map(sec => {
                const v    = selections[cuisine]?.[sec.id];
                const done = sec.type==="multi3" ? Array.isArray(v)&&v.length===3 : !!v;
                return (
                  <div key={sec.id} className={`scard ${done?"ok":""}`}>
                    <div className="slbl">
                      {sec.label}
                      {done && <span className="chk">вЂљГєГ¬</span>}
                    </div>
                    <div className="shint">
                      {sec.hint}
                      {sec.type==="multi3" && (
                        <span className="cnt" style={{color:(v||[]).length===3?"var(--ok)":"inherit"}}>
                          {" "}({(v||[]).length}/3)
                        </span>
                      )}
                    </div>
                    <div className="ilist">
                      {sec.groups
                        ? sec.groups.map(g => (
                            <div key={g.label}>
                              <div className="glbl">{g.label}</div>
                              {renderItems(cuisine, sec, g.items)}
                            </div>
                          ))
                        : renderItems(cuisine, sec, sec.items)
                      }
                    </div>
                  </div>
                );
              })}

              {menuData.fixed && (
                <div className="scard" style={{background:"#FAFAF8",marginBottom:4}}>
                  <div className="slbl">Accompaniments</div>
                  <div className="shint">Included вЂљГ„Г® no choice needed</div>
                  <div className="fchips">{menuData.fixed.map(f=><span key={f} className="fchip">вЂљГєГ¬ {f}</span>)}</div>
                </div>
              )}
            </div>
          );
        })}

        <div style={{marginTop:20}}>
          <button className="btn btn-pri" disabled={!canConfirm}
            onClick={() => onSave({name: name||`Person ${slotIdx+1}`, selections})}>
            Confirm вЂљГєГ¬
          </button>
        </div>
        <div style={{height:20}}/>
      </div>
    </div>
  );
}

// вЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄ
//  SUMMARY SCREEN
// вЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄ
function Summary({ data, sessionId, onBack }) {
  const [tab,   setTab]   = useState("cook");
  const [toast, showToast] = useToast();

  const people   = data?.people ? Object.values(data.people).filter(p=>p.confirmed) : [];
  const groups   = buildConsolidatedOrder(data);
  const cookText = buildCookText(data);

  const copyText = () =>
    navigator.clipboard.writeText(cookText).then(()=>showToast("Copied! Paste into WhatsApp / email пЈїГјГ¬ГЈ"));

  const sendWA = () =>
    window.open(`https://wa.me/?text=${encodeURIComponent(cookText)}`, "_blank");

  return (
    <div>
      <div className="hdr np">
        <button className="hdr-back" onClick={onBack}>вЂљГњГЄ Back</button>
        <div className="hdr-brand">Sage Villa В¬в€‘ Code: {sessionId}</div>
        <div className="hdr-title">
          {tab === "cook" ? "Cook's Order" : "Per Person"}
        </div>
      </div>
      <div className="main">

        <div className="tabs np">
          <button className={`tab ${tab==="cook"?"active":""}`} onClick={()=>setTab("cook")}>
            пЈїГјГ«В®вЂљГ„Г§пЈїГјГ§в‰Ґ Cook's View
          </button>
          <button className={`tab ${tab==="persons"?"active":""}`} onClick={()=>setTab("persons")}>
            пЈїГјГІГЈ Per Person
          </button>
        </div>

        {tab === "cook" && (
          <>
            {people.length < 4 && (
              <p style={{fontSize:13,color:"var(--muted)",textAlign:"center",marginBottom:16}}>
                вЂљГЁв‰Ґ {4-people.length} more order{4-people.length>1?"s":""} pending вЂљГ„Г® showing partial view
              </p>
            )}
            {groups.map(group => (
              <div key={group.id} className="cgroup">
                <div className="cgroup-hdr">
                  <span className="cgroup-label">{group.label}</span>
                  <span className="cgroup-count">
                    {group.items.reduce((s,i)=>s+i.count,0)} order{group.items.reduce((s,i)=>s+i.count,0)>1?"s":""}
                  </span>
                </div>
                {group.items.map((item,i) => (
                  <div key={i} className="citem">
                    <span className="citem-dish">{item.dish}</span>
                    <div className="citem-right">
                      <div><span className="citem-count">в€љГі {item.count}</span></div>
                      <div className="citem-who">{item.names.join(", ")}</div>
                    </div>
                  </div>
                ))}
              </div>
            ))}
          </>
        )}

        {tab === "persons" && people.map((p, i) => (
          <div key={i} className="sum-card">
            <div className="sum-hdr" style={{background:PAX_COLORS[i]||"#888"}}>
              <div className="sum-av">{initials(p.name)}</div>
              <div className="sum-pname">{p.name}</div>
            </div>
            <div className="sum-body">
              {Object.entries(MENU).map(([cuisine, menuData]) => {
                const cuisineSel = p.selections?.[cuisine];
                if (!cuisineSel || !Object.values(cuisineSel).some(v=>v)) return null;
                return (
                  <div key={cuisine}>
                    <div className="sum-cuisine-lbl">{MM[cuisine].emoji} {MM[cuisine].name}</div>
                    {menuData.sections.map(sec => {
                      const v = cuisineSel[sec.id];
                      if (!v) return null;
                      return (
                        <div key={sec.id} className="srow">
                          <span className="sl">{sec.label}</span>
                          <span className="sv">{Array.isArray(v) ? v.join(", ") : v}</span>
                        </div>
                      );
                    })}
                  </div>
                );
              })}
            </div>
          </div>
        ))}

        <button className="wa-btn np" onClick={sendWA}>
          <span>пЈїГјГ¬в‰¤</span> Send to Cook via WhatsApp
        </button>
        <div className="row np">
          <button className="btn btn-out" onClick={copyText}>пЈїГјГ¬ГЈ Copy Text</button>
          <button className="btn btn-out" onClick={()=>window.print()}>пЈїГјГ±В®Г”в€ЏГЁ Print</button>
        </div>
      </div>
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

// вЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄ
//  ROOT APP
// вЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄвЂљГЇГЄ
function App() {
  const [screen,  setScreen]  = useState("landing");
  const [sid,     setSid]     = useState(null);
  const [sData,   setSData]   = useState(null);
  const [mySlot,  setMySlot]  = useState(null);

  useEffect(() => {
    const s = new URLSearchParams(window.location.search).get("s");
    if (s) {
      const code = s.toUpperCase();
      setSid(code);
      const saved = localStorage.getItem(`ms_${code}`);
      if (saved !== null) setMySlot(parseInt(saved));
      setScreen("session");
    }
  }, []);

  useEffect(() => {
    if (!sid || !db) return;
    const ref = db.ref(`sessions/${sid}`);
    ref.on("value", snap => setSData(snap.val() || {people:{}}));
    return () => ref.off();
  }, [sid]);

  const createSession = () => {
    const code = genCode();
    const init = Object.fromEntries([0,1,2,3].map(i=>[i,{name:"",selections:{},confirmed:false}]));
    db.ref(`sessions/${code}`).set({createdAt:Date.now(), people:init});
    setSid(code);
    window.history.pushState({}, "", `?s=${code}`);
    setScreen("session");
  };

  const joinSession = (code) => {
    const c = code.toUpperCase();
    setSid(c);
    const saved = localStorage.getItem(`ms_${c}`);
    if (saved !== null) setMySlot(parseInt(saved));
    window.history.pushState({}, "", `?s=${c}`);
    setScreen("session");
  };

  const claimSlot = (i) => {
    setMySlot(i);
    localStorage.setItem(`ms_${sid}`, i);
    db.ref(`sessions/${sid}/people/${i}/reservedAt`).set(Date.now());
    setScreen("order");
  };

  const saveOrder = (orderData) => {
    db.ref(`sessions/${sid}/people/${mySlot}`).update({...orderData, confirmed:true});
    setScreen("session");
  };

  if (NEEDS_SETUP) return <SetupGuide />;

  if (screen==="landing") return <Landing onCreate={createSession} onJoin={joinSession} />;

  if (!sData) return <div className="loader"><div className="spin"/></div>;

  if (screen==="session") return (
    <Session
      sessionId={sid} data={sData} mySlot={mySlot}
      onClaim={claimSlot} onSummary={()=>setScreen("summary")}
    />
  );

  if (screen==="order") return (
    <OrderFlow
      slotIdx={mySlot} existing={sData?.people?.[mySlot]}
      onSave={saveOrder} onBack={()=>setScreen("session")}
    />
  );

  if (screen==="summary") return (
    <Summary data={sData} sessionId={sid} onBack={()=>setScreen("session")} />
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
